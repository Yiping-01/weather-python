<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雨日提醒您｜未來七天天氣預報</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #eef1ff 0%, #f8f8ff 100%);
      --main-purple: #eef0ff;
      --text-dark: #5f5f6f;
      --text-title: #686878;
      --accent-orange: #ffb45d;
      --card-gray: #ececf4;

      --map-bg: #ffffff;
      --map-hover: #eef0ff;
      --map-active: #9b86ff;
      --map-line: #1f2440;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      color: var(--text-dark);
      padding: 28px;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      background: var(--main-purple);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 16px 45px rgba(100, 105, 150, 0.18);
    }

    .title {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .title .icon {
      font-size: 44px;
    }

    h1 {
      font-size: 34px;
      letter-spacing: 2px;
      color: var(--text-title);
      text-shadow: 2px 2px 0 #ffffff;
    }

    .weather-panel {
      background: #fff;
      border: 2px solid #252525;
      border-radius: 28px;
      padding: 28px;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 34px;
      min-height: 560px;
    }

    .map-area {
      position: relative;
      background: #fdfdfd;
      border-radius: 20px;
      border: 1px dashed #cbd5e0;
      min-height: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 40px;
      overflow: hidden;
    }

    .hint {
      position: absolute;
      top: 15px;
      font-weight: 700;
      color: var(--text-title);
      font-size: 15px;
      background: rgba(238, 240, 255, 0.85);
      padding: 4px 14px;
      border-radius: 20px;
      z-index: 5;
    }

    .map-container {
      width: 100%;
      max-width: 390px;
      height: 500px;
      position: relative;
      margin-top: 10px;
    }

    #taiwanMap {
      width: 100%;
      height: 100%;
      display: block;
    }

    .county {
      fill: var(--map-bg);
      stroke: var(--map-line);
      stroke-width: 0.75;
      cursor: pointer;
      transition: fill 0.2s ease, stroke-width 0.2s ease, filter 0.2s ease;
    }

    .county:hover {
      fill: var(--map-hover);
      stroke-width: 1.4;
      filter: drop-shadow(0 2px 4px rgba(80, 80, 110, 0.18));
    }

    .county.active {
      fill: var(--map-active) !important;
      stroke: #4d3fb3;
      stroke-width: 1.8;
      filter: drop-shadow(0 4px 8px rgba(100, 90, 180, 0.28));
    }

    .map-ui-overlay {
      position: absolute;
      bottom: 15px;
      left: 15px;
      background: rgba(255, 255, 255, 0.92);
      padding: 8px 14px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      border: 1px solid #e2e8f0;
      pointer-events: none;
      z-index: 5;
    }

    .city-label {
      font-size: 18px;
      color: #4a5568;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend {
      position: absolute;
      right: 15px;
      bottom: 15px;
      font-size: 13px;
      color: var(--text-title);
      background: rgba(255, 255, 255, 0.88);
      padding: 8px;
      border-radius: 10px;
      z-index: 5;
    }

    .legend-title {
      font-weight: 800;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      font-weight: 700;
    }

    .color-box {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      display: inline-block;
      border: 1px solid #b8b8c8;
    }

    .rain-heavy {
      background: #ffd6d9;
      border-color: #e4575f;
    }

    .rain-light {
      background: #ffe2b8;
      border-color: #ffb45d;
    }

    .rain-none {
      background: #ffffff;
      border-color: #4f5268;
    }

    .info-card {
      background: var(--card-gray);
      border-radius: 28px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    select,
    button {
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 16px;
    }

    select {
      background: #fff;
      color: #606070;
      min-width: 180px;
      font-weight: 700;
    }

    button {
      background: var(--accent-orange);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(255, 180, 93, 0.35);
    }

    .location {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-title);
      font-size: 30px;
      font-weight: 800;
      border-bottom: 2px solid rgba(0, 0, 0, 0.05);
      padding-bottom: 5px;
    }

    .location-icon {
      font-size: 34px;
    }

    .current-weather {
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: center;
      gap: 16px;
      background: #fff;
      padding: 15px;
      border-radius: 18px;
    }

    .big-weather-icon {
      font-size: 80px;
      text-align: center;
      line-height: 1;
    }

    .current-info {
      font-size: 15px;
      line-height: 1.6;
      font-weight: 700;
    }

    .alert {
      color: #f25d5d;
      font-size: 17px;
      font-weight: 900;
      margin-top: 4px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .day-card {
      background: #fff;
      border-radius: 14px;
      padding: 10px 4px;
      text-align: center;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(120, 120, 150, 0.08);
    }

    .day-name {
      font-size: 13px;
      font-weight: 900;
      color: #747486;
    }

    .day-icon {
      font-size: 32px;
      margin: 2px 0;
    }

    .day-temp {
      font-size: 12px;
      font-weight: 800;
    }

    .chart-box {
      background: #fff;
      border-radius: 20px;
      padding: 16px;
      min-height: 220px;
      flex-grow: 1;
      position: relative;
    }

    /* 情緒價值功能區 */
    .emotion-card {
      background: #fff;
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 4px 10px rgba(120, 120, 150, 0.08);
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 14px;
      align-items: center;
    }

    .companion-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #eef0ff, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      box-shadow: inset 0 -6px 12px rgba(160, 160, 210, 0.18);
    }

    .emotion-title {
      font-size: 15px;
      font-weight: 900;
      color: var(--text-title);
      margin-bottom: 6px;
    }

    .emotion-text {
      font-size: 14px;
      line-height: 1.6;
      color: #4f5268;
      font-weight: 700;
    }

    .warm-reminder {
      background: linear-gradient(135deg, #fff7ec, #ffffff);
      border-left: 6px solid var(--accent-orange);
      border-radius: 16px;
      padding: 14px 16px;
      color: #5f5f6f;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 800;
      box-shadow: 0 4px 10px rgba(120, 120, 150, 0.08);
    }

    .activity-card {
      background: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 4px 10px rgba(120, 120, 150, 0.08);
    }

    .activity-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .activity-header label {
      font-weight: 900;
      color: var(--text-title);
      font-size: 15px;
    }

    #activitySelect {
      min-width: 130px;
      padding: 9px 12px;
      font-size: 14px;
      border-radius: 12px;
      background: #f7f7ff;
    }

    .activity-message {
      font-size: 14px;
      line-height: 1.6;
      color: #4f5268;
      font-weight: 700;
    }

    .loading {
      font-weight: 800;
      color: #7a7890;
      background: #fff;
      padding: 8px 15px;
      border-radius: 10px;
      display: inline-block;
    }

    .error {
      color: #e4575f;
      font-weight: 900;
      line-height: 1.6;
      background: #fff;
      padding: 8px 15px;
      border-radius: 10px;
    }

    @media (max-width: 900px) {
      .weather-panel {
        grid-template-columns: 1fr;
      }

      .map-area {
        min-height: 520px;
      }

      .days {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="title">
      <div class="icon">🌧️</div>
      <h1>雨日提醒您</h1>
    </div>

    <section class="weather-panel">
      <div class="map-area">
        <div class="hint">🎯 直接點擊地圖縣市切換預報</div>

        <div class="map-container">
          <svg id="taiwanMap"></svg>
        </div>

        <div class="map-ui-overlay">
          <div class="city-label">📍 <span id="mapCity">桃園市</span></div>
        </div>

        <div class="legend">
          <div class="legend-title">降雨機率燈號</div>
          <div class="legend-item"><span class="color-box rain-heavy"></span>高機率 ≥50%</div>
          <div class="legend-item"><span class="color-box rain-light"></span>低機率 &lt;50%</div>
          <div class="legend-item"><span class="color-box rain-none"></span>無雨</div>
        </div>
      </div>

      <div class="info-card">
        <div class="search-row">
          <select id="citySelect" onchange="syncSelectToMap()">
            <option value="臺北市">臺北市</option>
            <option value="新北市">新北市</option>
            <option value="桃園市">桃園市</option>
            <option value="臺中市">臺中市</option>
            <option value="臺南市">臺南市</option>
            <option value="高雄市">高雄市</option>
            <option value="基隆市">基隆市</option>
            <option value="新竹縣">新竹縣</option>
            <option value="新竹市">新竹市</option>
            <option value="苗栗縣">苗栗縣</option>
            <option value="彰化縣">彰化縣</option>
            <option value="南投縣">南投縣</option>
            <option value="雲林縣">雲林縣</option>
            <option value="嘉義縣">嘉義縣</option>
            <option value="嘉義市">嘉義市</option>
            <option value="屏東縣">屏東縣</option>
            <option value="宜蘭縣">宜蘭縣</option>
            <option value="花蓮縣">花蓮縣</option>
            <option value="臺東縣">臺東縣</option>
            <option value="澎湖縣">澎湖縣</option>
            <option value="金門縣">金門縣</option>
            <option value="連江縣">連江縣</option>
          </select>
          <button onclick="loadWeather()">查詢天氣</button>

        <div class="location">
          <span class="location-icon">📍</span>

        </div>

        <div class="current-weather">
          <div class="big-weather-icon" id="currentIcon">🌦️</div>
          <div class="current-info">
            <div id="currentText">目前：等待資料</div>
            <div class="alert" id="rainAlert">載入中...</div>
          </div>
        </div>

        <div class="warm-reminder" id="warmReminder">
          今日暖心提醒：正在為你準備今天的天氣小提醒...
        </div>

        <div class="emotion-card">
          <div class="companion-avatar" id="companionIcon">☁️</div>
          <div>
            <div class="emotion-title" id="companionName">雲朵小助手</div>
            <div class="emotion-text" id="companionText">
              我會根據天氣提醒你今天適合怎麼出門，也記得好好照顧自己。
            </div>
          </div>
        </div>

        <div class="activity-card">
          <div class="activity-header">
            <label for="activitySelect">今天你要做什麼？</label>
            <select id="activitySelect">
              <option value="上課">上課</option>
              <option value="上班">上班</option>
              <option value="約會">約會</option>
              <option value="旅行">旅行</option>
              <option value="宅在家">宅在家</option>
            </select>
          </div>

            選一個今天的情境，我會給你更貼近生活的小提醒。
          </div>

        <div class="section-title">未來七日天氣 ☁️</div>

        <div class="chart-box">
          <canvas id="weatherChart"></canvas>
        </div>
      </div>

  </main>

  <script>
    const API_KEY = "CWA-C00C85F2-5345-4447-B50A-7EB2396408A1";
    const API_URL = "https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-D0047-091";

    let weatherChart = null;
    let allWeatherLocations = [];

    const citySelect = document.getElementById("citySelect");
    const cityName = document.getElementById("cityName");
    const mapCity = document.getElementById("mapCity");
    const statusBox = document.getElementById("status");
    const currentIcon = document.getElementById("currentIcon");
    const currentText = document.getElementById("currentText");
    const rainAlert = document.getElementById("rainAlert");
    const daysContainer = document.getElementById("daysContainer");
    const warmReminder = document.getElementById("warmReminder");
    const companionIcon = document.getElementById("companionIcon");
    const companionName = document.getElementById("companionName");
    const companionText = document.getElementById("companionText");
    const activitySelect = document.getElementById("activitySelect");
    const activityMessage = document.getElementById("activityMessage");

    let latestWeatherNow = null;

    citySelect.value = "桃園市";

    const countyNameMap = {
      "台北市": "臺北市",
      "臺北市": "臺北市",
      "新北市": "新北市",
      "桃園縣": "桃園市",
      "桃園市": "桃園市",
      "台中市": "臺中市",
      "臺中市": "臺中市",
      "台南市": "臺南市",
      "臺南市": "臺南市",
      "高雄市": "高雄市",
      "基隆市": "基隆市",
      "新竹縣": "新竹縣",
      "新竹市": "新竹市",
      "苗栗縣": "苗栗縣",
      "彰化縣": "彰化縣",
      "南投縣": "南投縣",
      "雲林縣": "雲林縣",
      "嘉義縣": "嘉義縣",
      "嘉義市": "嘉義市",
      "屏東縣": "屏東縣",
      "宜蘭縣": "宜蘭縣",
      "花蓮縣": "花蓮縣",
      "台東縣": "臺東縣",
      "臺東縣": "臺東縣",
      "澎湖縣": "澎湖縣",
      "金門縣": "金門縣",
      "連江縣": "連江縣"
    };

    function normalizeCountyName(name) {
      return countyNameMap[name] || name || "";
    }

    function getGeoCountyName(feature) {
      const p = feature.properties || {};

      return normalizeCountyName(
        p.COUNTYNAME ||
        p.COUNTY_NAME ||
        p.COUNTY ||
        p.COUNTY_NAM ||
        p.COUNTYID ||
        p.name ||
        p.NAME ||
        p.Name ||
        p.county ||
        ""
      );
    }

    async function drawTaiwanGeoMap() {
      const svg = d3.select("#taiwanMap");
      const width = 390;
      const height = 500;

      svg.attr("viewBox", `0 0 ${width} ${height}`);

      try {
        const geoData = await d3.json("taiwan-county.geojson.json");

        const projection = d3.geoMercator().fitSize([width, height], geoData);
        const path = d3.geoPath().projection(projection);

        svg
          .selectAll("path")
          .data(geoData.features)
          .join("path")
          .attr("class", "county")
          .attr("d", path)
          .attr("data-name", d => getGeoCountyName(d))
          .on("click", function (event, d) {
            const city = getGeoCountyName(d);

            if (!city) return;

            citySelect.value = city;
            highlightMap(city);
            loadWeather();
          })
          .on("mouseover", function (event, d) {
            const city = getGeoCountyName(d);
            mapCity.textContent = city || "未知縣市";
          })
          .on("mouseout", function () {
            mapCity.textContent = citySelect.value;
          });

        highlightMap(citySelect.value);
      } catch (error) {
        console.error(error);
        statusBox.textContent = "地圖讀取失敗，請確認 taiwan-county.geojson.json 是否跟 weather.html 放在同一個資料夾。";
        statusBox.className = "error";
      }
    }

    function syncSelectToMap() {
      highlightMap(citySelect.value);
      loadWeather();
    }

    function highlightMap(cityNameStr) {
      document.querySelectorAll(".county").forEach(el => {
        el.classList.remove("active");
      });

      const activeCounty = document.querySelector(`.county[data-name="${cityNameStr}"]`);

      if (activeCounty) {
        activeCounty.classList.add("active");
      }

      mapCity.textContent = cityNameStr;
    }

    function weatherToIcon(text) {
      if (!text) return "🌤️";
      if (text.includes("雷")) return "⛈️";
      if (text.includes("雨")) return "🌧️";
      if (text.includes("陰")) return "☁️";
      if (text.includes("多雲")) return "🌥️";
      if (text.includes("晴")) return "☀️";
      return "🌤️";
    }

    function getFirstValue(elementValue) {
      if (!elementValue || elementValue.length === 0) return "";
      const firstItem = elementValue[0];
      if (!firstItem) return "";
      return Object.values(firstItem)[0] || "";
    }

    function findLocations(obj, locations = []) {
      if (Array.isArray(obj)) {
        obj.forEach(item => findLocations(item, locations));
      } else if (obj && typeof obj === "object") {
        if (obj.LocationName && obj.WeatherElement) {
          locations.push(obj);
        }
        Object.values(obj).forEach(value => findLocations(value, locations));
      }
      return locations;
    }

    function shortDate(dateString) {
      const date = new Date(dateString);
      const week = ["日", "一", "二", "三", "四", "五", "六"];
      const hour = date.getHours();
      const period = hour < 12 ? "白天" : "晚上";
      return `周${week[date.getDay()]}${period}`;
    }

    function shortDayOnly(dateString) {
      const date = new Date(dateString);
      const week = ["日", "一", "二", "三", "四", "五", "六"];

      return `周${week[date.getDay()]}`;
    }

    function getDailyData(data) {
      const dailyMap = {};

      data.forEach(item => {
        const date = new Date(item.startTime);
        const dateKey = date.toISOString().split("T")[0];

        const maxTemp = Number(item.maxTemp || 0);
        const minTemp = Number(item.minTemp || 999);
        const pop = item.pop === "-" || item.pop === "" ? 0 : Number(item.pop || 0);

        if (!dailyMap[dateKey]) {
          dailyMap[dateKey] = {
            startTime: item.startTime,
            weather: item.weather || "",
            maxTemp: maxTemp,
            minTemp: minTemp,
            pop: pop,
            description: item.description || ""
          };
        } else {
          dailyMap[dateKey].maxTemp = Math.max(dailyMap[dateKey].maxTemp, maxTemp);
          dailyMap[dateKey].minTemp = Math.min(dailyMap[dateKey].minTemp, minTemp);
          dailyMap[dateKey].pop = Math.max(dailyMap[dateKey].pop, pop);

          if (item.weather && item.weather.includes("雨")) {
            dailyMap[dateKey].weather = item.weather;
          } else if (!dailyMap[dateKey].weather && item.weather) {
            dailyMap[dateKey].weather = item.weather;
          }

          if (!dailyMap[dateKey].description && item.description) {
            dailyMap[dateKey].description = item.description;
          }
        }
      });

      return Object.values(dailyMap).slice(0, 7);
    }

    function parseWeather(location) {
      const result = {};

      location.WeatherElement.forEach(element => {
        const elementName = element.ElementName;

        element.Time.forEach(timeData => {
          const startTime = timeData.StartTime;
          const endTime = timeData.EndTime;
          const key = `${startTime}_${endTime}`;

          if (!result[key]) {
            result[key] = {
              startTime,
              endTime,
              weather: "",
              maxTemp: "",
              minTemp: "",
              pop: "",
              description: ""
            };
          }

          const value = getFirstValue(timeData.ElementValue);

          if (elementName === "天氣現象") {
            result[key].weather = value;
          } else if (elementName === "最高溫度") {
            result[key].maxTemp = value;
          } else if (elementName === "最低溫度") {
            result[key].minTemp = value;
          } else if (elementName === "12小時降雨機率") {
            result[key].pop = value;
          } else if (elementName === "天氣預報綜合描述") {
            result[key].description = value;
          }
        });
      });

      return Object.values(result).filter(item => item.weather || item.description);
    }

    function renderDays(data) {
      daysContainer.innerHTML = "";

      const firstSevenDays = getDailyData(data);

      firstSevenDays.forEach(item => {
        const card = document.createElement("div");
        card.className = "day-card";

        card.innerHTML = `
      <div class="day-name">${shortDayOnly(item.startTime)}</div>
      <div class="day-icon">${weatherToIcon(item.weather)}</div>
      <div class="day-temp">${item.minTemp || "-"}° / ${item.maxTemp || "-"}°</div>
    `;

        daysContainer.appendChild(card);
      });
    }

    function renderChart(data) {
      const firstSeven = data.slice(0, 7);
      const labels = firstSeven.map(item => shortDate(item.startTime));
      const maxTemps = firstSeven.map(item => Number(item.maxTemp || 0));
      const rainPops = firstSeven.map(item => {
        if (item.pop === "-") return 0;
        return Number(item.pop || 0);
      });

      const ctx = document.getElementById("weatherChart");

      if (weatherChart) {
        weatherChart.destroy();
      }

      weatherChart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "最高溫度 °C",
              data: maxTemps,
              borderWidth: 3,
              tension: 0.35,
              yAxisID: "y",
              borderColor: "#fc8181",
              backgroundColor: "#fc8181"
            },
            {
              label: "降雨機率 %",
              data: rainPops,
              borderWidth: 3,
              tension: 0.35,
              yAxisID: "y1",
              borderColor: "#63b3ed",
              backgroundColor: "#63b3ed"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              position: "left",
              title: {
                display: true,
                text: "溫度 °C"
              }
            },
            y1: {
              beginAtZero: true,
              max: 100,
              position: "right",
              grid: {
                drawOnChartArea: false
              },
              title: {
                display: true,
                text: "降雨機率 %"
              }
            }
          }
        }
      });
    }

    function updateMapColors(allLocations) {
      document.querySelectorAll(".county").forEach(el => {
        const cityNameStr = el.getAttribute("data-name");
        const target = allLocations.find(item => item.LocationName === cityNameStr);

        if (!target) {
          el.style.fill = "#ffffff";
          return;
        }

        const parsed = parseWeather(target);

        if (parsed.length > 0 && parsed[0].pop !== "-") {
          const popVal = Number(parsed[0].pop);

          if (popVal >= 50) {
            el.style.fill = "#ffd6d9";
          } else if (popVal > 0) {
            el.style.fill = "#ffe2b8";
          } else {
            el.style.fill = "#ffffff";
          }
        } else {
          el.style.fill = "#ffffff";
        }
      });
    }

    function getPopValue(now) {
      if (!now || now.pop === "-" || now.pop === "") return 0;
      return Number(now.pop || 0);
    }

    function getTempValue(now) {
      if (!now) return 0;
      return Number(now.maxTemp || now.minTemp || 0);
    }

    function updateEmotionFeatures(now) {
      latestWeatherNow = now;

      const pop = getPopValue(now);
      const maxTemp = getTempValue(now);
      const weather = now && now.weather ? now.weather : "";
      const activity = activitySelect ? activitySelect.value : "上課";

      let warmText = "";
      let icon = "☁️";
      let name = "雲朵小助手";
      let companion = "";

      if (pop >= 70 || weather.includes("大雨") || weather.includes("豪雨")) {
        icon = "🌧️";
        name = "雨滴小精靈";
        warmText = "今日暖心提醒：雨勢可能比較明顯，出門慢慢來，安全比準時更重要。";
        companion = "今天外面的雨比較有存在感，我會提醒你帶傘，也提醒你別急著趕路。";
      } else if (pop >= 40 || weather.includes("雨")) {
        icon = "🌂";
        name = "雨傘小管家";
        warmText = "今日暖心提醒：今天可能會下點雨，帶把傘會讓你安心很多。";
        companion = "我幫你把雨傘放進提醒清單了，今天也要把自己照顧好。";
      } else if (maxTemp >= 33) {
        icon = "☀️";
        name = "晴天小太陽";
        warmText = "今日暖心提醒：今天溫度偏高，記得補水，也別讓自己太累。";
        companion = "陽光很努力，你也很努力。出門記得帶水，給自己一點休息時間。";
      } else if (weather.includes("陰") || weather.includes("多雲")) {
        icon = "☁️";
        name = "雲朵小助手";
        warmText = "今日暖心提醒：今天雲比較多，很適合放慢步調，把事情一件一件做好。";
        companion = "陰天不代表壞心情，今天也可以溫柔地完成自己的節奏。";
      } else {
        icon = "🌤️";
        name = "天氣小夥伴";
        warmText = "今日暖心提醒：今天看起來是適合出門的一天，願你一路順利。";
        companion = "天氣看起來蠻穩定的，適合帶著輕鬆一點的心情出門。";
      }

      warmReminder.textContent = warmText;
      companionIcon.textContent = icon;
      companionName.textContent = name;
      companionText.textContent = companion;

      updateActivityMessage(now);
    }

    function updateActivityMessage(now) {
      const activity = activitySelect ? activitySelect.value : "上課";
      const pop = getPopValue(now || latestWeatherNow);
      const weather = now && now.weather ? now.weather : (latestWeatherNow && latestWeatherNow.weather ? latestWeatherNow.weather : "");

      const rainy = pop >= 40 || weather.includes("雨");

      const messages = {
        "上課": rainy
          ? "上課提醒：今天路上可能比較濕，建議提早一點出門，書包也可以多放一把摺疊傘。"
          : "上課提醒：今天通勤壓力比較小，帶著清爽的心情去上課吧。",
        "上班": rainy
          ? "上班提醒：雨天通勤容易塞車或延誤，提早出門會讓今天更從容。"
          : "上班提醒：天氣相對穩定，今天可以把節奏排得舒服一點。",
        "約會": rainy
          ? "約會提醒：帶傘也可以是一種貼心，雨天的行程也能很浪漫。"
          : "約會提醒：今天很適合出門見面，記得留一點時間好好享受相處。",
        "旅行": rainy
          ? "旅行提醒：建議準備雨具和備用襪子，行程可以多排一些室內景點。"
          : "旅行提醒：天氣不錯，適合拍照和散步，但還是記得補水。",
        "宅在家": rainy
          ? "宅家提醒：今天很適合待在室內，泡杯熱飲，讓自己好好休息一下。"
          : "宅家提醒：即使不出門，也可以打開窗戶透透氣，給自己一點陽光。"
      };

      activityMessage.textContent = messages[activity] || "今天也要好好照顧自己。";
    }

    if (activitySelect) {
      activitySelect.addEventListener("change", function () {
        updateActivityMessage(latestWeatherNow);
      });
    }

    async function loadWeather() {
      const city = citySelect.value;

      cityName.textContent = city;
      mapCity.textContent = city;

      statusBox.textContent = "資料載入中...";
      statusBox.className = "loading";
      statusBox.style.display = "inline-block";

      if (API_KEY === "請換成你的中央氣象署API授權碼") {
        statusBox.textContent = "請先在程式碼裡填入你的中央氣象署 API_KEY。";
        statusBox.className = "error";
        return;
      }

      const url = `${API_URL}?Authorization=${API_KEY}&format=JSON&sort=time`;

      try {
        const response = await fetch(url);
        const data = await response.json();
        const locations = findLocations(data);

        allWeatherLocations = locations;

        updateMapColors(locations);
        highlightMap(city);

        const target = locations.find(item => item.LocationName === city);

        if (!target) {
          statusBox.textContent = `找不到 ${city} 的資料。`;
          statusBox.className = "error";
          return;
        }

        const parsedData = parseWeather(target);
        const now = parsedData[0];

        if (!now) {
          statusBox.textContent = "有抓到資料，但沒有整理出天氣資料。";
          statusBox.className = "error";
          return;
        }

        statusBox.textContent = "資料載入成功";
        statusBox.style.display = "none";

        currentIcon.textContent = weatherToIcon(now.weather);

        currentText.textContent =
          `目前：${now.weather || "無資料"} / 降雨 ${now.pop || "-"}% / ${now.minTemp || "-"}°C - ${now.maxTemp || "-"}°C`;

        if (Number(now.pop) >= 50 || (now.weather && now.weather.includes("雨"))) {
          rainAlert.textContent = "出門記得帶傘喔!! ☂️";
          rainAlert.style.color = "#f25d5d";
        } else {
          rainAlert.textContent = "今天降雨機率較低 😊";
          rainAlert.style.color = "#2b6cb0";
        }

        updateEmotionFeatures(now);
        renderDays(parsedData);
        
        // 已經將註解拿掉，啟用動態繪圖！
        renderChart(parsedData);
        
      } catch (error) {
        console.error(error);
        statusBox.textContent = "讀取失敗，請確認網路或 API 金鑰。";
        statusBox.className = "error";
        statusBox.style.display = "block";
      }
    }

    drawTaiwanGeoMap().then(() => {
      loadWeather();
    });
  </script>
</body>

</html>
